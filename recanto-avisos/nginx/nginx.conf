events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile     on;

    # Compressão gzip
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml image/svg+xml font/woff2;

    # Limite para upload do CSV
    client_max_body_size 10M;

    # ── HTTP: redirecionar para HTTPS (exceto certbot) ────────────────────
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS ─────────────────────────────────────────────────────────────
    # IMPORTANTE: substitua SEU_DOMINIO pelo valor de DOMAIN no .env
    server {
        listen 443 ssl;
        server_name SEU_DOMINIO;

        ssl_certificate     /etc/letsencrypt/live/SEU_DOMINIO/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/SEU_DOMINIO/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        add_header X-Frame-Options   SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header Referrer-Policy   strict-origin-when-cross-origin;

        # ── API: proxy para o backend ────────────────────────────────────
        location /api/ {
            proxy_pass         http://backend:3001;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── Painel Admin (SPA) ───────────────────────────────────────────
        location /admin/ {
            alias /usr/share/nginx/html/admin/;
            try_files $uri $uri/ /admin/index.html;
        }

        # ── PWA dos responsáveis (SPA) ───────────────────────────────────
        location / {
            root  /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;

            # Cache longo para assets com hash
            location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2?)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }
    }
}
