version: "3.8"

services:

  # ── Backend Node.js ────────────────────────────────────────────────────────
  backend:
    build: ./backend
    expose:
      - "3001"
    volumes:
      - ./data:/app/data
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Build do painel admin (one-shot) ─────────────────────────────────────
  admin-panel:
    build: ./admin-panel
    volumes:
      - admin_dist:/output
    restart: "no"

  # ── Build do PWA (one-shot) ───────────────────────────────────────────────
  pwa-responsaveis:
    build: ./pwa-responsaveis
    volumes:
      - pwa_dist:/output
    restart: "no"

  # ── Nginx (proxy + static files) ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certbot/conf:/etc/letsencrypt:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
      - pwa_dist:/usr/share/nginx/html:ro
      - admin_dist:/usr/share/nginx/html/admin:ro
    depends_on:
      backend:
        condition: service_healthy
      admin-panel:
        condition: service_completed_successfully
      pwa-responsaveis:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Certbot (renovação SSL automática) ────────────────────────────────────
  certbot:
    image: certbot/certbot
    volumes:
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do certbot renew --quiet; sleep 12h & wait $${!}; done"
    restart: unless-stopped

volumes:
  admin_dist:
  pwa_dist:
