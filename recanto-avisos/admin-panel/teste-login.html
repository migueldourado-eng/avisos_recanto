<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Teste Login Admin</title>
  <style>
    body { font-family: monospace; padding: 2rem; background: #f0f0f0; }
    input, button { display: block; margin: 0.5rem 0; padding: 0.5rem; font-size: 1rem; width: 300px; }
    #resultado { margin-top: 1rem; padding: 1rem; background: white; border: 1px solid #ccc; white-space: pre-wrap; word-break: break-all; min-height: 3rem; }
  </style>
</head>
<body>
  <h2>Teste de Login — Recanto Avisos</h2>
  <label>Usuário:</label>
  <input id="u" type="text" value="gestao_escolar">
  <label>Senha:</label>
  <input id="s" type="password" value="Recanto@82463179">
  <button onclick="testar()">Testar Login</button>
  <div id="resultado">Aguardando...</div>

  <script>
    async function testar() {
      const res = document.getElementById('resultado')
      res.textContent = 'Enviando...'
      try {
        const r = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            usuario: document.getElementById('u').value,
            senha:   document.getElementById('s').value
          })
        })
        const data = await r.json()
        if (r.ok) {
          res.style.background = '#d4edda'
          res.textContent = '✅ LOGIN OK!\n\nToken recebido: ' + data.token.substring(0,40) + '...\nAdmin: ' + JSON.stringify(data.admin)
        } else {
          res.style.background = '#f8d7da'
          res.textContent = '❌ Erro ' + r.status + ': ' + data.error
        }
      } catch(e) {
        res.style.background = '#f8d7da'
        res.textContent = '❌ Erro de rede: ' + e.message
      }
    }
  </script>
</body>
</html>
